<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>翻译 Translate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Figtree', -apple-system, sans-serif;
    letter-spacing: -0.03em;
    background: #fff;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
  }

  .history-btn {
    align-self: flex-end;
    padding: 16px 22px;
    font-size: 26px;
    font-weight: 500;
    font-family: -apple-system, "PingFang SC", "Heiti SC", sans-serif;
    background: #98DBFF;
    color: #000;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .history-btn:active {
    opacity: 0.8;
  }

  textarea {
    flex: 1;
    font-size: 48px;
    font-weight: 400;
    line-height: 1.4;
    padding: 20px;
    border: 3px solid #ccc;
    border-radius: 16px;
    resize: none;
    outline: none;
    font-family: -apple-system, "PingFang SC", "Heiti SC", sans-serif;
  }

  textarea:focus {
    border-color: #4A90D9;
  }

  textarea::placeholder {
    color: #bbb;
  }

  .btn-row {
    display: flex;
    gap: 12px;
  }

  .mode-btn {
    padding: 20px;
    font-size: 26px;
    font-weight: 500;
    font-family: -apple-system, "PingFang SC", "Heiti SC", sans-serif;
    background: #F0F0F0;
    color: #000;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }

  .mode-btn:active {
    opacity: 0.8;
  }

  .translate-btn {
    flex: 1;
    padding: 20px;
    font-size: 32px;
    font-weight: 500;
    font-family: 'Figtree', -apple-system, sans-serif;
    background: #53ED69;
    color: #000000;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .translate-btn:active {
    opacity: 0.8;
  }

  #output {
    flex: 1;
    font-family: 'Figtree', -apple-system, sans-serif;
    font-weight: 500;
    font-size: 44px;
    line-height: 1.4;
    padding: 20px;
    background: #F5F5F5;
    border-radius: 16px;
    overflow-y: auto;
    color: #333;
  }

  #output.placeholder {
    color: #bbb;
  }

  .action-btn {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: #FF8A42;
    color: #000000;
    border: none;
    border-radius: 12px;
    padding: 16px 22px;
    font-size: 26px;
    font-weight: 500;
    align-items: center;
    gap: 10px;
    font-family: -apple-system, "PingFang SC", "Heiti SC", sans-serif;
    cursor: pointer;
    display: none;
    -webkit-tap-highlight-color: transparent;
  }

  .action-btn:active {
    opacity: 0.8;
  }

  .input-wrap {
    flex: 1;
    position: relative;
    display: flex;
    min-height: 0;
  }

  .input-wrap textarea { width: 100%; }

  /* History overlay */
  .history-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    flex-direction: column;
    padding: 16px;
  }

  .history-overlay.open {
    display: flex;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .history-title {
    font-size: 32px;
    font-weight: 500;
    font-family: -apple-system, "PingFang SC", "Heiti SC", sans-serif;
  }

  .history-close {
    padding: 16px 22px;
    font-size: 26px;
    font-weight: 500;
    font-family: -apple-system, "PingFang SC", "Heiti SC", sans-serif;
    background: #98DBFF;
    color: #000;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .history-close:active {
    opacity: 0.8;
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .history-item {
    position: relative;
    padding: 20px;
    padding-right: 84px;
    background: #F5F5F5;
    border-radius: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .trash-btn {
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    padding: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    color: #FF4444;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
  }

  .trash-btn:active {
    background: rgba(255, 68, 68, 0.15);
  }

  .history-item:active {
    background: #E8E8E8;
  }

  .history-zh {
    font-size: 36px;
    font-family: -apple-system, "PingFang SC", "Heiti SC", sans-serif;
    font-weight: 400;
    margin-bottom: 8px;
    color: #000;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-en {
    font-size: 28px;
    font-family: 'Figtree', -apple-system, sans-serif;
    font-weight: 500;
    color: #666;
    letter-spacing: -0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-empty {
    font-size: 28px;
    color: #bbb;
    text-align: center;
    margin-top: 40px;
  }
</style>
</head>
<body>

<button class="history-btn" onclick="openHistory()"><svg xmlns="http://www.w3.org/2000/svg" width="31" height="31" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 历史 History</button>

<div class="input-wrap">
  <textarea id="input" placeholder="在这里写字..." lang="zh" autofocus></textarea>
  <button class="action-btn" id="actionBtn"></button>
</div>

<div class="btn-row">
  <button class="mode-btn" id="modeBtn" onclick="toggleMode()">中文 → English</button>
  <button class="translate-btn" onclick="doTranslate()">翻译 Translate</button>
</div>

<div id="output" class="placeholder">English will appear here...</div>

<div class="history-overlay" id="historyOverlay">
  <div class="history-header">
    <span class="history-title">历史 History</span>
    <button class="history-close" onclick="closeHistory()">关闭 Close</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
  const input = document.getElementById('input');
  const output = document.getElementById('output');
  const actionBtn = document.getElementById('actionBtn');
  const historyOverlay = document.getElementById('historyOverlay');
  const historyList = document.getElementById('historyList');

  const modeBtn = document.getElementById('modeBtn');

  // URL-triggered history clear: ?clear=all or ?clear=3 (clears newest N)
  (function handleClearParam() {
    const params = new URLSearchParams(window.location.search);
    const clearVal = params.get('clear');
    if (!clearVal) return;
    try {
      const history = JSON.parse(localStorage.getItem('translateHistory') || '[]');
      let removed = 0;
      if (clearVal === 'all') {
        removed = history.length;
        localStorage.removeItem('translateHistory');
      } else {
        const n = parseInt(clearVal, 10);
        if (n > 0) {
          removed = Math.min(n, history.length);
          history.splice(0, n);
          localStorage.setItem('translateHistory', JSON.stringify(history));
        }
      }
      // strip the param so a refresh doesn't re-clear
      window.history.replaceState({}, '', window.location.pathname);
      setTimeout(() => alert(`已删除 ${removed} 条历史\nDeleted ${removed} entries`), 100);
    } catch (e) {}
  })();

  let savedText = '';
  let savedTranslation = '';
  let isUndo = false;
  let mode = 'zh2en'; // 'zh2en' or 'en2zh'

  function toggleMode() {
    if (mode === 'zh2en') {
      mode = 'en2zh';
      modeBtn.textContent = 'English → 中文';
      input.placeholder = 'Type here...';
      input.lang = 'en';
      output.textContent = '中文翻译会出现在这里...';
    } else {
      mode = 'zh2en';
      modeBtn.textContent = '中文 → English';
      input.placeholder = '在这里写字...';
      input.lang = 'zh';
      output.textContent = 'English will appear here...';
    }
    input.value = '';
    output.classList.add('placeholder');
    actionBtn.style.display = 'none';
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem('translateHistory') || '[]'); }
    catch { return []; }
  }

  function saveToHistory(zh, en) {
    const history = getHistory();
    history.unshift({ zh, en, mode, time: Date.now() });
    if (history.length > 100) history.length = 100;
    localStorage.setItem('translateHistory', JSON.stringify(history));
  }

  function openHistory() {
    const history = getHistory();
    historyList.innerHTML = '';
    if (history.length === 0) {
      historyList.innerHTML = '<div class="history-empty">还没有历史 No history yet</div>';
    } else {
      history.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<div class="history-zh">${escapeHtml(item.zh)}</div><div class="history-en">${escapeHtml(item.en)}</div><button class="trash-btn" aria-label="Delete"><svg xmlns="http://www.w3.org/2000/svg" width="31" height="31" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`;
        const trashBtn = div.querySelector('.trash-btn');
        trashBtn.onclick = (e) => {
          e.stopPropagation();
          deleteHistoryItem(i);
        };
        trashBtn.ontouchstart = (e) => { e.stopPropagation(); };
        div.onclick = () => {
          const itemMode = item.mode || 'zh2en';
          if (itemMode === 'zh2en') {
            mode = 'zh2en';
            modeBtn.textContent = '中文 → English';
            input.placeholder = '在这里写字...';
            input.lang = 'zh';
            input.value = item.zh;
            output.textContent = item.en;
          } else {
            mode = 'en2zh';
            modeBtn.textContent = 'English → 中文';
            input.placeholder = 'Type here...';
            input.lang = 'en';
            input.value = item.en;
            output.textContent = item.zh;
          }
          output.classList.remove('placeholder');
          showClear();
          closeHistory();
        };

        historyList.appendChild(div);
      });
    }
    historyOverlay.classList.add('open');
  }

  function closeHistory() {
    historyOverlay.classList.remove('open');
  }

  function deleteHistoryItem(index) {
    const history = getHistory();
    history.splice(index, 1);
    localStorage.setItem('translateHistory', JSON.stringify(history));
    openHistory();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  input.addEventListener('input', () => {
    if (input.value) {
      showClear();
    } else {
      actionBtn.style.display = 'none';
    }
  });

  function showClear() {
    isUndo = false;
    actionBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="31" height="31" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> 清除 Clear';
    actionBtn.style.background = '#FF8A42';
    actionBtn.style.display = 'flex';
    actionBtn.onclick = clearInput;
  }

  function showUndo() {
    isUndo = true;
    actionBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="31" height="31" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="m15 14 5-5-5-5"/><path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5A5.5 5.5 0 0 0 9.5 20H13"/></svg> 撤消 Undo';
    actionBtn.style.background = '#FFE240';
    actionBtn.style.display = 'flex';
    actionBtn.onclick = undoInput;
  }

  function getOutputPlaceholder() {
    return mode === 'zh2en' ? 'English will appear here...' : '中文翻译会出现在这里...';
  }

  function clearInput() {
    savedText = input.value;
    savedTranslation = output.textContent;
    input.value = '';
    output.textContent = getOutputPlaceholder();
    output.classList.add('placeholder');
    showUndo();
    input.focus();
  }

  function undoInput() {
    input.value = savedText;
    if (savedTranslation && savedTranslation !== 'English will appear here...') {
      output.textContent = savedTranslation;
      output.classList.remove('placeholder');
    }
    showClear();
    input.focus();
  }

  async function doTranslate() {
    const text = input.value.trim();
    if (!text) return;

    output.classList.remove('placeholder');
    output.textContent = mode === 'zh2en' ? 'Translating...' : '翻译中...';

    const sl = mode === 'zh2en' ? 'zh-CN' : 'en';
    const tl = mode === 'zh2en' ? 'en' : 'zh-CN';

    try {
      const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`);
      const data = await res.json();
      const translated = data[0].map(s => s[0]).join('');
      output.textContent = translated;
      const zh = mode === 'zh2en' ? text : translated;
      const en = mode === 'zh2en' ? translated : text;
      saveToHistory(zh, en);
    } catch (e) {
      output.textContent = 'Error: ' + e.message;
    }
  }
</script>

</body>
</html>
